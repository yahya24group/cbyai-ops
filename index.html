<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C BY AI — Operations Console</title>
<!-- ponytail: Google Fonts load when online; system fallbacks keep it usable offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#14304A; --teal:#0F6E5C; --bg:#F7FAF9; --line:#C9D2D0;
    --green:#1E8E5A; --amber:#B8860B; --red:#C0392B;
    --card:#FFFFFF; --text:#16302a; --muted:#5a6b66;
    --radius:14px; --shadow:0 1px 3px rgba(20,48,74,.08),0 6px 18px rgba(20,48,74,.06);
    --font-en:"Inter",Arial,system-ui,sans-serif;
    --font-ar:"Cairo","Tajawal","Noto Naskh Arabic",Arial,sans-serif;
    --font:var(--font-en);
  }
  html[lang="ar"]{ --font:var(--font-ar); }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.5}
  a{color:var(--teal)}
  button{font-family:inherit}

  /* Header */
  header.app{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;
    display:flex;align-items:center;gap:16px;padding:10px 18px;box-shadow:var(--shadow)}
  .brand{font-weight:700;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(15,110,92,.3)}
  .brand small{font-weight:400;opacity:.8;font-size:12px}
  .header-progress{margin-inline-start:auto;display:flex;align-items:center;gap:12px;font-size:13px}
  .hp-bar{width:120px;height:8px;border-radius:8px;background:rgba(255,255,255,.2);overflow:hidden}
  .hp-bar i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
  .langswitch{display:flex;border:1px solid rgba(255,255,255,.4);border-radius:10px;overflow:hidden}
  .langswitch button{background:transparent;color:#fff;border:0;padding:7px 12px;cursor:pointer;font-weight:600;font-size:13px}
  .langswitch button.active{background:var(--teal)}
  .menu-toggle{display:none;background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer}

  /* Layout */
  .layout{display:flex;align-items:flex-start}
  aside.sidebar{position:sticky;top:56px;height:calc(100vh - 56px);width:300px;flex:0 0 300px;
    overflow-y:auto;background:var(--card);border-inline-end:1px solid var(--line);padding:14px}
  .search{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;font-size:14px}
  .nav-group-title{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:0;
    font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:12px 0 4px;padding:5px 6px;cursor:pointer;font-family:inherit}
  .nav-group-title:hover{color:var(--navy)}
  .nav-group-title .caret{font-size:10px;opacity:.7}
  .nav-group-items{display:flex;flex-direction:column}

  /* Home hero — pick your station (primary action) */
  .station-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-top:6px}
  .station-grid button{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 14px;
    border:1px solid var(--line);border-radius:16px;background:var(--card);cursor:pointer;font-weight:600;color:var(--navy);
    box-shadow:var(--shadow);font-size:15px;transition:transform .12s,border-color .12s;font-family:inherit}
  .station-grid button:hover{border-color:var(--teal);transform:translateY(-2px)}
  .station-grid .ic{font-size:36px;line-height:1}
  .today-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:30px;font-size:14px;font-weight:600;color:#fff}
  .today-pill.open{background:var(--teal)} .today-pill.closed{background:var(--red)}
  .quiet-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .quiet-link{background:transparent;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;color:var(--muted);font-weight:600;font-size:13px;font-family:inherit}
  .quiet-link:hover{color:var(--navy);border-color:var(--teal)}
  .nav-item{display:flex;align-items:center;gap:8px;width:100%;text-align:start;background:transparent;border:0;
    padding:8px 10px;border-radius:10px;cursor:pointer;color:var(--text);font-size:14px}
  .nav-item:hover{background:#eef4f2}
  .nav-item.active{background:#e3efeb;color:var(--navy);font-weight:600}
  .nav-item .badge{margin-inline-start:auto;font-size:11px;min-width:20px;text-align:center;border-radius:20px;padding:1px 7px;background:#eef1f0;color:var(--muted)}
  .nav-item .badge.done{background:var(--green);color:#fff}

  main.content{flex:1;min-width:0;padding:24px 28px 80px;max-width:1100px}
  .page-purpose{color:var(--muted);font-size:15px;margin:-4px 0 18px}
  h1.page-title{font-size:26px;margin:0 0 4px;color:var(--navy)}
  h2{font-size:19px;color:var(--navy);margin:26px 0 12px}
  h3{font-size:16px;color:var(--navy);margin:18px 0 8px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
  .grid{display:grid;gap:16px}
  .grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:start;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{background:#eef4f2;color:var(--navy);font-weight:600}

  .rag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
  .rag.green{background:var(--green)} .rag.amber{background:var(--amber)} .rag.red{background:var(--red)}

  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#eef1f0;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

  /* checklist */
  .chk-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .chk-bar{flex:1;min-width:140px;height:9px;border-radius:9px;background:#eef1f0;overflow:hidden}
  .chk-bar i{display:block;height:100%;background:var(--teal);width:0;transition:width .25s}
  .chk-list{list-style:none;padding:0;margin:12px 0 0}
  .chk-list li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .chk-list input{width:18px;height:18px;margin-top:2px;accent-color:var(--teal);flex:0 0 auto}
  .chk-list label{cursor:pointer;font-size:14px}
  .chk-list li.checked label{text-decoration:line-through;color:var(--muted)}
  .btn{background:var(--teal);color:#fff;border:0;border-radius:9px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:13px}
  .btn.ghost{background:transparent;color:var(--teal);border:1px solid var(--teal)}
  .btn.navy{background:var(--navy)}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

  /* role card */
  .rolecard{border-inline-start:4px solid var(--teal)}
  .rolecard .line{display:flex;gap:8px;padding:5px 0;font-size:14px}
  .rolecard .line b{flex:0 0 130px;color:var(--navy)}
  .rolecard .line.never b{color:var(--red)}

  /* calculator */
  .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .field{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .field label{font-size:13px;color:var(--muted)}
  .field input{width:110px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;text-align:end;font-family:inherit}
  .out{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .out b{color:var(--navy)}
  input.actual{width:90px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;text-align:end;font-family:inherit}
  input[data-input]{background:#eef6ff}

  .kpi-counts{display:flex;gap:12px;flex-wrap:wrap}
  .countbox{flex:1;min-width:120px;text-align:center;padding:14px;border-radius:var(--radius);color:#fff}
  .countbox .n{font-size:30px;font-weight:700;line-height:1}
  .countbox .l{font-size:12px;opacity:.95;margin-top:4px}

  .quick-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .quick-links button{padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);cursor:pointer;font-weight:600;color:var(--navy);box-shadow:var(--shadow)}
  .quick-links button:hover{border-color:var(--teal)}

  .status-banner{padding:16px 18px;border-radius:var(--radius);color:#fff;font-size:18px;font-weight:600}
  .status-banner.open{background:var(--teal)}
  .status-banner.closed{background:var(--red)}

  .reviewed-toggle{display:inline-flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer;font-size:14px}
  .reviewed-toggle input{width:18px;height:18px;accent-color:var(--green)}

  .hidden{display:none !important}

  @media (max-width:860px){
    .menu-toggle{display:inline-block}
    aside.sidebar{position:fixed;top:56px;inset-inline-start:0;z-index:25;box-shadow:var(--shadow);transform:translateX(-110%);transition:transform .25s}
    html[dir="rtl"] aside.sidebar{transform:translateX(110%)}
    aside.sidebar.open{transform:translateX(0)}
    .calc-grid{grid-template-columns:1fr}
    main.content{padding:18px 16px 70px}
  }

  @media print{
    header.app,aside.sidebar,.menu-toggle,.btn,.btn-row,.search,.langswitch,.reviewed-toggle{display:none !important}
    main.content{max-width:100%;padding:0}
    .card{box-shadow:none;break-inside:avoid}
    body{background:#fff}
  }
  :focus-visible{outline:3px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>
<header class="app">
  <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
  <div class="brand"><span class="dot"></span> C BY AI <small data-i="consoleSub"></small></div>
  <div class="header-progress">
    <span data-i="progress"></span>
    <span class="hp-bar"><i id="globalBar"></i></span>
    <span id="globalPct">0%</span>
  </div>
  <div class="langswitch" role="group" aria-label="Language">
    <button id="langEn" class="active" onclick="setLang('en')">EN</button>
    <button id="langAr" onclick="setLang('ar')">العربية</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <input class="search" id="search" oninput="onSearch(this.value)" placeholder="Search…" data-ph="search">
    <nav id="nav"></nav>
  </aside>
  <main class="content" id="content" tabindex="-1"></main>
</div>

<script>
/* ============================================================
   C BY AI — Operations Console.  Single file, offline, no backend.
   Content model uses { en, ar } pairs so language toggle never
   reloads or loses tracked progress.  Edit DATA below to change text.
   ============================================================ */

/* ---------- persistent store: localStorage + in-memory fallback ---------- */
const Store = (() => {
  const KEY = "cbyai:v1";
  let mem = {};
  let usable = true;
  try { localStorage.setItem("cbyai:test","1"); localStorage.removeItem("cbyai:test"); }
  catch(e){ usable = false; }
  function load(){
    if(!usable) return mem;
    try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; }
  }
  let state = load();
  state.reviewed = state.reviewed || {};
  state.checklists = state.checklists || {};
  state.kpi = state.kpi || {};
  state.lang = state.lang || "en";
  function save(){
    if(!usable){ mem = state; return; }
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){ mem = state; }
  }
  return { state, save,
    reset(){ state.reviewed={}; state.checklists={}; state.kpi={}; save(); } };
})();

/* ---------- UI strings ---------- */
const T = {

  progress:{en:"Progress",ar:"التقدم"},

  target:{en:"Target",ar:"المستهدف"},actual:{en:"Actual",ar:"الفعلي"},status:{en:"Status",ar:"الحالة"},owner:{en:"Owner",ar:"المسؤول"},dir:{en:"Dir",ar:"الاتجاه"},

  quickLinks:{en:"Quick links",ar:"روابط سريعة"},
  roleRef:{en:"Quick reference",ar:"بطاقة مرجعية سريعة"},
  youOwn:{en:"You own",ar:"أنت مسؤول عن"},eachShift:{en:"Each shift you",ar:"في كل وردية"},
  alwaysCheck:{en:"Always check",ar:"تحقق دائمًا"},never:{en:"Never",ar:"ممنوع تمامًا"},handOff:{en:"Hand off to",ar:"سلّم إلى"},

  compute:{en:"Compute",ar:"احتساب"},
  reorder:{en:"REORDER",ar:"إعادة الطلب"},ok:{en:"OK",ar:"سليم"},
  noResults:{en:"No matching sections.",ar:"لا توجد أقسام مطابقة."},
  weekday:{en:["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
           ar:["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"]},
  whoAreYou:{en:"Who are you? Open your station",ar:"من أنت؟ افتح محطتك"},
  handoffFrom:{en:"Receive from",ar:"تستلم من"},
  handoffTo:{en:"Hand off to",ar:"تسلّم إلى"},
  meYou:{en:"YOU",ar:"أنت"},
  myChecklists:{en:"My checklist today",ar:"قائمة تحققي اليوم"},
  myKpis:{en:"My numbers",ar:"أرقامي"},
  myDocs:{en:"My guides",ar:"أدلتي"},
  perStationToday:{en:"Stations — done today",ar:"المحطات — المنجز اليوم"},
  openLabel:{en:"Open",ar:"افتح"},
  fullGuide:{en:"Open full guide",ar:"افتح الدليل الكامل"},
  connectIntro:{en:"Every station feeds the next. Tap any station to open it.",ar:"كل محطة تغذّي التالية. اضغط أي محطة لفتحها."},
};
const t = k => T[k] ? T[k][LANG] : k;
function L(o){ return o ? (o[LANG]||o.en) : ""; }

/* ---------- checklists ---------- */
const CHECKLISTS = {
  kitchenDaily:{title:{en:"Kitchen — Daily",ar:"المطبخ — يومية"},cad:"daily",items:[
    {en:"Fridge/freezer temps logged",ar:"تسجيل درجات حرارة الثلاجة/المجمّد"},
    {en:"Probes & scales calibrated",ar:"معايرة المجسّات والموازين"},
    {en:"Plan received & recipe versions confirmed",ar:"استلام الخطة وتأكيد إصدارات الوصفات"},
    {en:"Hygiene / fitness-to-work checked",ar:"فحص النظافة واللياقة للعمل"},
    {en:"Allergen watch-items noted",ar:"تدوين عناصر مسببات الحساسية"},
    {en:"Cook temps logged every batch (≥75 °C)",ar:"تسجيل حرارة الطهي لكل دفعة (≥75 °م)"},
    {en:"Portion weights recorded",ar:"تسجيل أوزان الحصص"},
    {en:"End-of-day clean-down signed",ar:"توقيع التنظيف نهاية اليوم"}]},
  kitchenWeekly:{title:{en:"Kitchen — Weekly",ar:"المطبخ — أسبوعية"},cad:"weekly",items:[
    {en:"Deep clean equipment/extraction/drains",ar:"تنظيف عميق للمعدات والشفط والمصارف"},
    {en:"Calibration verification",ar:"التحقق من المعايرة"},

    {en:"Pest-control check",ar:"فحص مكافحة الآفات"},
    {en:"Recipe-version audit",ar:"تدقيق إصدارات الوصفات"},
    {en:"Review temp logs with QA",ar:"مراجعة سجلات الحرارة مع الجودة"}]},
  kitchenMonthly:{title:{en:"Kitchen — Monthly",ar:"المطبخ — شهرية"},cad:"monthly",items:[
    {en:"HACCP record review & trend",ar:"مراجعة سجلات هاسب والاتجاهات"},
    {en:"Mock recall / traceability readiness",ar:"جاهزية الاستدعاء التجريبي والتتبّع"},
    {en:"Preventive-maintenance review",ar:"مراجعة الصيانة الوقائية"},
    {en:"Supplier quality review",ar:"مراجعة جودة المورّدين"},

  qcIncoming:{title:{en:"QC — Incoming goods",ar:"الجودة — البضائع الواردة"},cad:"daily",items:[
    {en:"Delivery matches PO",ar:"مطابقة التسليم لأمر الشراء"},
    {en:"Chilled ≤5 °C / frozen ≤−18 °C",ar:"مبرّد ≤5 °م / مجمّد ≤−18 °م"},
    {en:"Quality/dates/packaging/allergen labels",ar:"الجودة/التواريخ/التغليف/ملصقات الحساسية"},
    {en:"Sampling / COA & lot codes",ar:"العينات / شهادة التحليل ورموز الدفعات"},
    {en:"Accept / partial / reject logged",ar:"تسجيل القبول/الجزئي/الرفض"}]},
  qcDispatch:{title:{en:"QC — Dispatch gate",ar:"الجودة — بوابة الإرسال"},cad:"daily",items:[
    {en:"Order complete & QC-released",ar:"الطلب مكتمل ومُفرج عنه من الجودة"},
    {en:"Product ≤5 °C",ar:"المنتج ≤5 °م"},
    {en:"Vehicle pre-chilled",ar:"تبريد المركبة مسبقًا"},
    {en:"Manifest matches",ar:"مطابقة بيان الشحن"},
    {en:"Cold-chain packaging adequate",ar:"تغليف سلسلة التبريد كافٍ"}]},
  packaging:{title:{en:"Packaging — Verification",ar:"التغليف — التحقق"},cad:"daily",items:[
    {en:"Container matches SKU & intact",ar:"العبوة مطابقة للصنف وسليمة"},
    {en:"Tamper-seal effective",ar:"ختم الأمان فعّال"},
    {en:"Label correct & reconciled",ar:"الملصق صحيح ومطابق"},
    {en:"Use-by correct",ar:"تاريخ الانتهاء صحيح"},
    {en:"No leakage, cold chain held",ar:"لا تسرّب، سلسلة التبريد محفوظة"}]},
  dispatchLoad:{title:{en:"Dispatch — Loading",ar:"الإرسال — التحميل"},cad:"daily",items:[
    {en:"Van pre-chilled & clean",ar:"الشاحنة مبرّدة مسبقًا ونظيفة"},
    {en:"Load by stop order",ar:"التحميل حسب ترتيب التوقفات"},
    {en:"Scan vs manifest",ar:"المسح مقابل بيان الشحن"},
    {en:"Cold-chain packaging",ar:"تغليف سلسلة التبريد"},
    {en:"Doors sealed & seal number recorded",ar:"إغلاق الأبواب وتسجيل رقم الختم"}]},
  vehiclePre:{title:{en:"Vehicle — Pre-trip",ar:"المركبة — قبل الرحلة"},cad:"daily",items:[
    {en:"Refrigeration working & at temp",ar:"التبريد يعمل وعلى الحرارة الصحيحة"},
    {en:"Tyres / brakes / lights",ar:"الإطارات / الفرامل / الأضواء"},
    {en:"Fuel / fluids",ar:"الوقود / السوائل"},
    {en:"Interior clean & food-safe",ar:"الداخل نظيف وآمن غذائيًا"},
    {en:"Registration & insurance valid",ar:"الترخيص والتأمين ساريان"}]},

// numeric target + tolerance parsing for status rule
function kpiTargetNum(s){ const m=String(s).match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }
function kpiStatus(dir,target,actual){
  const tgt=kpiTargetNum(target);
  if(actual===""||actual==null||isNaN(actual)||tgt==null) return null;
  actual=parseFloat(actual);
  if(dir===">="){
    if(actual>=tgt) return "green";
    if(actual>=0.9*tgt) return "amber";
    return "red";
  } else {
    if(actual<=tgt) return "green";
    if(actual<=1.1*tgt) return "amber";
    return "red";
  }
}

let LANG = Store.state.lang;
let CURRENT = "home";

function periodKey(cad){
  const d=new Date();
  if(cad==="daily") return d.toISOString().slice(0,10);
  if(cad==="monthly") return d.toISOString().slice(0,7);
  if(cad==="weekly"){ // ISO week
    const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
    const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
    const w=Math.ceil((((t-ys)/86400000)+1)/7);
    return t.getUTCFullYear()+"-W"+String(w).padStart(2,"0");
  }
  return "once";
}
function clKey(listId,cad){ return listId+"|"+periodKey(cad); }

function checklistProgress(listId){
  const cl=CHECKLISTS[listId]; const key=clKey(listId,cl.cad);
  const st=Store.state.checklists[key]||{};
  const done=cl.items.filter((_,i)=>st[i]).length;
  return {done, total:cl.items.length};
}

/* nav */
// Workers only need Stations + Quick Guide open; reference docs stay collapsed.
let navOpen={home:true, station:true, guide:true, ops:false, sys:false, gov:false};
function buildNav(filter){
  const nav=document.getElementById("nav"); nav.innerHTML="";
  filter=(filter||"").trim().toLowerCase();
  const order=["home","station","guide","ops","sys","gov"];
  const byGroup={}; order.forEach(g=>byGroup[g]=[]);
  SECTIONS.forEach(sec=>{
    const text=(L(sec.title)+" "+L(sec.purpose)).toLowerCase();
    if(filter && !text.includes(filter)) return;
    (byGroup[sec.group]||(byGroup[sec.group]=[])).push(sec);
  });
  let anyShown=false;
  function navItem(sec,parent){
    const b=document.createElement("button");
    b.className="nav-item"+(sec.id===CURRENT?" active":"");
    b.onclick=()=>{ go(sec.id); if(window.innerWidth<=860) document.getElementById("sidebar").classList.remove("open"); };
    const span=document.createElement("span"); span.textContent=L(sec.title); b.appendChild(span);
    const badge=badgeFor(sec);
    if(badge){ const bd=document.createElement("span"); bd.className="badge"+(badge.done?" done":""); bd.textContent=badge.label; b.appendChild(bd); }
    parent.appendChild(b);
  }
  order.forEach(g=>{
    const items=byGroup[g]; if(!items||!items.length) return;
    anyShown=true;
    const open = filter ? true : navOpen[g];
    const label=L(GROUPS[g]);
    if(!label){ items.forEach(s=>navItem(s,nav)); return; }
    const h=document.createElement("button"); h.className="nav-group-title";
    h.innerHTML=`<span>${label}</span><span class="caret">${open?"▾":"▸"}</span>`;
    h.onclick=()=>{ navOpen[g]=!navOpen[g]; buildNav(document.getElementById("search").value); };
    nav.appendChild(h);
    const box=document.createElement("div"); box.className="nav-group-items";
    if(!open) box.style.display="none";
    items.forEach(s=>navItem(s,box)); nav.appendChild(box);
  });
  if(!anyShown){ const p=document.createElement("div"); p.className="nav-group-title"; p.textContent=t("noResults"); nav.appendChild(p); }
}
function badgeFor(sec){
  const cls=sec.checklists||(sec.station&&sec.station.checklists);
  if(cls&&cls.length){
    let d=0,tt=0; cls.forEach(id=>{const p=checklistProgress(id); d+=p.done; tt+=p.total;});
    return {label:d+"/"+tt, done:tt>0&&d===tt};
  }
  if(sec.noReview) return null;
  const rv=Store.state.reviewed[sec.id];
  return {label:rv?"✓":"·", done:!!rv};
}

/* ---------- PRODUCTION CALCULATOR (Doc 4) ---------- */
function renderProdCalc(c){
  const defs={N:60,mpd:3,spd:2,alpha:10,eff:85,shift:8,cons:7,prod:6,tMeal:8,tSnack:3,oven:120,chiller:120,wage:18};
  const labels={N:["Customers (N)","عدد العملاء (N)"],mpd:["Meals/day","وجبات/يوم"],spd:["Snacks/day","وجبات خفيفة/يوم"],
    alpha:["Demand buffer α (%)","هامش الطلب α (%)"],eff:["Labour efficiency (%)","كفاءة العمالة (%)"],shift:["Shift hours","ساعات الوردية"],
    cons:["Consumption days/wk","أيام الاستهلاك/أسبوع"],prod:["Production days/wk (Fri off)","أيام الإنتاج/أسبوع (الجمعة إجازة)"],
    tMeal:["Std min/meal","دقائق/وجبة"],tSnack:["Std min/snack","دقائق/وجبة خفيفة"],oven:["Oven batch cap","سعة دفعة الفرن"],
    chiller:["Chiller cap/cycle","سعة المبرّد/دورة"],wage:["Loaded wage AED/hr","الأجر المحمّل د.إ/س"]};
  const wrap=document.createElement("div"); wrap.className="card";
  wrap.innerHTML=`<p style="color:var(--muted)">${t("inputsBlue")}</p>`;
  const grid=document.createElement("div"); grid.className="calc-grid";
  const inCol=document.createElement("div"); const outCol=document.createElement("div");
  inCol.innerHTML=`<h3>${LANG==="ar"?"المدخلات":"Inputs"}</h3>`; outCol.innerHTML=`<h3>${LANG==="ar"?"المخرجات (لكل يوم إنتاج)":"Outputs (per production day)"}</h3>`;
  const inputs={};
  Object.keys(defs).forEach(k=>{
    const f=document.createElement("div"); f.className="field";
    const lab=document.createElement("label"); lab.textContent=labels[k][LANG==="ar"?1:0];
    const inp=document.createElement("input"); inp.type="number"; inp.value=defs[k]; inp.dataset.input="1"; inp.oninput=calc;
    inputs[k]=inp; f.appendChild(lab); f.appendChild(inp); inCol.appendChild(f);
  });
  const outBox=document.createElement("div"); outCol.appendChild(outBox);
  grid.appendChild(inCol); grid.appendChild(outCol); wrap.appendChild(grid); c.appendChild(wrap);
  function num(k){return parseFloat(inputs[k].value)||0;}
  function calc(){
    const N=num("N"),mpd=num("mpd"),spd=num("spd"),alpha=num("alpha")/100,eff=num("eff")/100||1,
      shift=num("shift"),cons=num("cons"),prod=num("prod")||1,tMeal=num("tMeal"),tSnack=num("tSnack"),
      oven=num("oven")||1,chiller=num("chiller")||1,wage=num("wage");
    const weeklyMeals=N*mpd*cons, weeklySnacks=N*spd*cons;
    const mealsPD=weeklyMeals/prod, snacksPD=weeklySnacks/prod;
    const plannedMeals=mealsPD*(1+alpha), plannedSnacks=snacksPD*(1+alpha);
    const mealMin=mealsPD*tMeal/eff, snackMin=snacksPD*tSnack/eff;
    const hours=(mealMin+snackMin)/60, fte=hours/shift, cost=hours*wage;
    const ovenCycles=Math.ceil(plannedMeals/oven), chillerCycles=Math.ceil(plannedMeals/chiller);
    const costMeal=plannedMeals?cost/plannedMeals:0;
    const rows=[
      ["Weekly meals","الوجبات الأسبوعية",weeklyMeals.toFixed(0)],
      ["Meals / production day","وجبات/يوم إنتاج",mealsPD.toFixed(0)],
      ["Planned meals/day (+buffer)","وجبات مخطّطة/يوم (+هامش)",plannedMeals.toFixed(0)],
      ["Snacks / production day","وجبات خفيفة/يوم إنتاج",snacksPD.toFixed(0)],
      ["Labour hours / day","ساعات العمالة/يوم",hours.toFixed(1)],
      ["Kitchen FTE / day","عمالة مكافئة/يوم",fte.toFixed(1)],
      ["Labour cost / day (AED)","تكلفة العمالة/يوم (د.إ)",cost.toFixed(0)],
      ["Oven cycles / day","دورات الفرن/يوم",ovenCycles],
      ["Chiller cycles / day","دورات المبرّد/يوم",chillerCycles],
      ["Labour cost per meal (AED)","تكلفة العمالة للوجبة (د.إ)",costMeal.toFixed(2)],
    ];
    outBox.innerHTML=rows.map(r=>`<div class="out"><span>${r[LANG==="ar"?1:0]}</span><b>${r[2]}</b></div>`).join("");
  }

}

/* ---------- REORDER CALCULATOR (Doc 5/6) ---------- */
function renderReorder(c){
  const wrap=document.createElement("div"); wrap.className="card";
  wrap.innerHTML=`<p style="color:var(--muted)">${t("inputsBlue")}</p>`;
  const defs={d:["Avg daily use d","المتوسط اليومي d",40],L:["Lead time L (days)","مدة التوريد L (يوم)",3],
    sigma:["Demand σ","الانحراف σ",8],Z:["Service factor Z","عامل الخدمة Z",1.65],
    onhand:["On-hand","المتوفّر",150],D:["Annual demand D","الطلب السنوي D",14600],
    S:["Order cost S","تكلفة الطلب S",120],H:["Holding cost H","تكلفة التخزين H",6]};
  const grid=document.createElement("div"); grid.className="calc-grid";
  const inCol=document.createElement("div"); const outCol=document.createElement("div");
  inCol.innerHTML=`<h3>${LANG==="ar"?"المدخلات (لكل صنف)":"Inputs (per item)"}</h3>`; outCol.innerHTML=`<h3>${LANG==="ar"?"المخرجات":"Outputs"}</h3>`;
  const inputs={};
  Object.keys(defs).forEach(k=>{
    const f=document.createElement("div"); f.className="field";
    const lab=document.createElement("label"); lab.textContent=defs[k][LANG==="ar"?1:0];
    const inp=document.createElement("input"); inp.type="number"; inp.step="any"; inp.value=defs[k][2]; inp.dataset.input="1"; inp.oninput=calc;
    inputs[k]=inp; f.appendChild(lab); f.appendChild(inp); inCol.appendChild(f);
  });
  const outBox=document.createElement("div"); outCol.appendChild(outBox);
  grid.appendChild(inCol); grid.appendChild(outCol); wrap.appendChild(grid); c.appendChild(wrap);
  function num(k){return parseFloat(inputs[k].value)||0;}
  function calc(){
    const d=num("d"),L=num("L"),sigma=num("sigma"),Z=num("Z"),onhand=num("onhand"),D=num("D"),S=num("S"),H=num("H");
    const ss=Z*sigma*Math.sqrt(L), rop=d*L+ss, eoq=H?Math.sqrt(2*D*S/H):0, days=d?onhand/d:0;
    const flag=onhand<=rop?t("reorder"):t("ok");
    const rows=[
      ["Safety stock","مخزون الأمان",ss.toFixed(1)],
      ["Reorder point","نقطة إعادة الطلب",rop.toFixed(1)],
      ["EOQ","الكمية الاقتصادية",eoq.toFixed(0)],
      ["Days cover","أيام التغطية",days.toFixed(1)],
    ];
    outBox.innerHTML=rows.map(r=>`<div class="out"><span>${r[LANG==="ar"?1:0]}</span><b>${r[2]}</b></div>`).join("")
      +`<div class="out"><span>${t("status")}</span><span class="rag ${onhand<=rop?"red":"green"}">${flag}</span></div>`;
  }
  calc();
}

/* ---------- KPI TRACKER (Doc 18 + Appendix D) ---------- */
function renderKpiTracker(c){ kpiTable(c, KPIS); }
function kpiTable(c, list){
  const card=document.createElement("div"); card.className="card";
  const tbl=document.createElement("table");
  tbl.innerHTML=`<thead><tr><th>${t("kpiName")}</th><th>${t("dir")}</th><th>${t("target")}</th><th>${t("actual")}</th><th>${t("status")}</th><th>${t("owner")}</th></tr></thead>`;
  const tb=document.createElement("tbody");
  list.forEach(k=>{
    const [id,en,ar,target,dir,owner]=k;
    const tr=document.createElement("tr");
    const stCell=document.createElement("td");
    function paint(){
      const v=Store.state.kpi[id]; const s=kpiStatus(dir,target,v);
      stCell.innerHTML = s ? `<span class="rag ${s}">${t(s==="green"?"onTrack":s==="amber"?"watch":"offTrack")}</span>` : "—";
    }
    const nameTd=document.createElement("td"); nameTd.textContent=LANG==="ar"?ar:en;
    const dirTd=document.createElement("td"); dirTd.textContent=dir===">="?"≥":"≤";
    const tgtTd=document.createElement("td"); tgtTd.textContent=target;
    const actTd=document.createElement("td");
    const inp=document.createElement("input"); inp.className="actual"; inp.type="number"; inp.step="any";
    inp.value=Store.state.kpi[id]!=null?Store.state.kpi[id]:"";
    inp.oninput=()=>{ if(inp.value==="") delete Store.state.kpi[id]; else Store.state.kpi[id]=parseFloat(inp.value);
      Store.save(); paint(); };
    actTd.appendChild(inp);
    const ownTd=document.createElement("td"); ownTd.textContent=owner;
    tr.appendChild(nameTd); tr.appendChild(dirTd); tr.appendChild(tgtTd); tr.appendChild(actTd); tr.appendChild(stCell); tr.appendChild(ownTd);
    paint(); tb.appendChild(tr);
  });
  tbl.appendChild(tb); card.appendChild(tbl); c.appendChild(card);
}

/* ---------- STATION PAGE (one screen per worker) ---------- */
function handoffStrip(s){
  const wrap=document.createElement("div"); wrap.className="card";
  const row=document.createElement("div");
  row.style.cssText="display:flex;align-items:stretch;gap:10px;flex-wrap:wrap";
  function box(node,kind){
    const b=document.createElement(node.to?"button":"div");
    b.style.cssText="flex:1;min-width:120px;text-align:center;padding:12px;border-radius:12px;border:1px solid var(--line);background:"+(kind==="me"?"var(--teal)":"#eef4f2")+";color:"+(kind==="me"?"#fff":"var(--navy)")+";font-weight:600;cursor:"+(node.to?"pointer":"default");
    const lab=document.createElement("div"); lab.style.cssText="font-size:11px;opacity:.8;font-weight:400;margin-bottom:3px";
    lab.textContent=kind==="up"?t("handoffFrom"):kind==="down"?t("handoffTo"):"";
    const v=document.createElement("div"); v.textContent=node.text;
    if(kind!=="me") b.appendChild(lab);
    b.appendChild(v);
    if(node.to) b.onclick=()=>go(node.to);
    return b;
  }
  const arrow=()=>{ const a=document.createElement("div"); a.textContent=(LANG==="ar"?"←":"→"); a.style.cssText="align-self:center;font-size:22px;color:var(--muted)"; return a; };
  if(s.up){ row.appendChild(box({text:L(s.up.l),to:s.up.to},"up")); row.appendChild(arrow()); }
  row.appendChild(box({text:t("meYou")+" · "+L(s.name)},"me"));
  if(s.down){ row.appendChild(arrow()); row.appendChild(box({text:L(s.down.l),to:s.down.to},"down")); }
  wrap.appendChild(row); return wrap;
}
function renderStation(c, sec){
  const s=sec.station;
  c.appendChild(handoffStrip(s));
  if(s.manager){ renderManager(c); return; }
  // Worker view = just what they need: their job card + today's checklist + one guide link
  if(s.role) c.appendChild(roleCard(s.role));
  (s.checklists||[]).forEach(id=>c.appendChild(checklistCard(id)));
  if(s.docs && s.docs.length){
    const row=document.createElement("div"); row.className="btn-row";
    const b=document.createElement("button"); b.className="btn ghost";
    b.textContent=t("fullGuide"); b.onclick=()=>go(s.docs[0]);
    row.appendChild(b); c.appendChild(row);
  }
}
// Manager view = all the tracking, kept off the worker landing
function renderManager(c){
  c.appendChild(stationRollup());
  let g=0,a=0,r=0;
  KPIS.forEach(k=>{ const st=kpiStatus(k[4],k[3],Store.state.kpi[k[0]]);
    if(st==="green")g++; else if(st==="amber")a++; else if(st==="red")r++; });
  const kh=document.createElement("div"); kh.className="card";
  kh.innerHTML=`<h3>${t("kpiHealth")}</h3>`;
  const counts=document.createElement("div"); counts.className="kpi-counts";
  [[g,"onTrack","var(--green)"],[a,"watch","var(--amber)"],[r,"offTrack","var(--red)"]].forEach(([n,k,col])=>{
    const bx=document.createElement("div"); bx.className="countbox"; bx.style.background=col;
    bx.innerHTML=`<div class="n">${n}</div><div class="l">${t(k)}</div>`; counts.appendChild(bx);
  });
  kh.appendChild(counts); c.appendChild(kh);
  const h=document.createElement("h2"); h.textContent=t("myKpis"); c.appendChild(h);
  kpiTable(c, KPIS);
  const u=document.createElement("div"); u.className="btn-row"; u.style.marginTop="6px";
  const ex=document.createElement("button"); ex.className="btn navy"; ex.textContent=t("exportP"); ex.onclick=exportProgress;
  const rs=document.createElement("button"); rs.className="btn ghost"; rs.textContent=t("resetAll");
  rs.onclick=()=>{ Store.reset(); go("st_manager"); };
  u.appendChild(ex); u.appendChild(rs); c.appendChild(u);
}
function stationRollup(){
  const card=document.createElement("div"); card.className="card";
  const h=document.createElement("h3"); h.textContent=t("perStationToday"); card.appendChild(h);
  STATIONS.filter(s=>s.checklists&&s.checklists.length).forEach(s=>{
    let d=0,tt=0; s.checklists.forEach(id=>{const p=checklistProgress(id); d+=p.done; tt+=p.total;});
    const row=document.createElement("div"); row.className="chk-head"; row.style.margin="8px 0";
    const nm=document.createElement("span"); nm.style.cssText="flex:0 0 150px;font-size:14px"; nm.textContent=s.icon+" "+L(s.name);
    const bar=document.createElement("span"); bar.className="chk-bar"; const bi=document.createElement("i");
    bi.style.width=(tt?d/tt*100:0)+"%"; bar.appendChild(bi);
    const pct=document.createElement("span"); pct.style.cssText="font-size:13px;color:var(--muted)"; pct.textContent=d+"/"+tt;
    row.appendChild(nm); row.appendChild(bar); row.appendChild(pct); card.appendChild(row);
  });
  return card;
}

/* ---------- global progress (reviewed sections + checklists) ---------- */
function updateGlobalProgress(){
  let done=0,total=0; const seen={};
  SECTIONS.forEach(s=>{
    const cls=s.checklists||(s.station&&s.station.checklists);
    if(cls&&cls.length){ cls.forEach(id=>{ if(seen[id]) return; seen[id]=1; const p=checklistProgress(id); done+=p.done; total+=p.total;}); }
    else if(!s.noReview){ total++; if(Store.state.reviewed[s.id]) done++; }
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("globalBar").style.width=pct+"%";
  document.getElementById("globalPct").textContent=pct+"%";
}
